<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculatore</title>
<style>
    #calculatore{
        border-radius: 11px;
    background: #333;
    width: 400px;
    height: 600px;
    margin: auto;
    box-shadow: 20px 15px 33px #0000005e;
    padding: 20px 10px;
}
    #resulte{
        background: #fefefe;
    width: 90%;
    height: 60px;
    font-size: 40px;
    padding: 10px;
    font-family: sans-serif;
    display: block;
    margin: auto;
    position: relative;
    top: 50px;
    border-radius: 10px;
    }
    #calculatore button{
        cursor: pointer;
        background-color: #333;
    position: relative;
    width: 100px;
    height: 70px;
    border-radius: 10px;
    display: inline-block;
    text-align: center;
    font-size: 60px;
    color: #fefefe;
    margin: 9px 15px;
    border-color: #ff0068;;
    top: 100px;
    box-shadow: 2px 2px 9px #00000087;
    }
    #calculatore button:hover{
        border-color: #913359;
    }
  button#clear{
    font-size: 27px;
    top: 85px;
  }
</style>
</head>
<body>
    
<div id="calculatore">
  <div id="resulte"> </div>
  <button id="one">1</button>
  <button id="two">2</button>
  <button id="three">3</button>
  <button id="four">4</button>
  <button id="five">5</button>
  <button id="six">6</button>
  <button id="seven">7</button>
  <button id="eight">8</button>
  <button id="nighn">9</button>
  <button id="equal">=</button>
  <button id="sum">+</button>
  <button id="subtraction">-</button>
  <button id="multyply">x</button>
  <button id="apportion">/</button>
  <button id="clear">Clear</button>
</div>
    <script src="learn javascript.js"></script>
</body>
</html>
